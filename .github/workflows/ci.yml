name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict lint
        run: npm run lint:strict

      - name: Typecheck
        run: npm run typecheck

      - name: Capability reconciliation
        run: npm run check:capabilities

      - name: Architecture budgets
        run: npm run check:architecture

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: npm run analyze:bundle

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:smoke:ci

      - name: Collect changed files
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .pr-changed-files.txt

      - name: Select targeted PR tests
        if: github.event_name == 'pull_request'
        id: targeted-tests
        run: npm run select:pr-tests -- .pr-changed-files.txt

      - name: Targeted PR tests
        if: github.event_name == 'pull_request' && steps.targeted-tests.outputs.count != '0'
        shell: bash
        run: |
          while IFS= read -r command; do
            if [ -n "$command" ]; then
              echo "$command"
              eval "$command"
            fi
          done <<'EOF'
          ${{ steps.targeted-tests.outputs.commands }}
          EOF

  full-playwright:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Full Playwright shard
        run: npm run test:full:shard -- ${{ matrix.shard }}/4
