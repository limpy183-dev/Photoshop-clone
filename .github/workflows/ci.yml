name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Local verification contract
        run: npm run verify

      - name: Collect changed files
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .pr-changed-files.txt

      - name: Select targeted PR tests
        if: github.event_name == 'pull_request'
        id: targeted-tests
        run: npm run select:pr-tests -- .pr-changed-files.txt

      - name: Targeted PR tests
        if: github.event_name == 'pull_request' && steps.targeted-tests.outputs.count != '0'
        run: node scripts/run-selected-tests.mjs "${{ steps.targeted-tests.outputs.manifest }}"

      - name: Changed-line pure-module coverage
        if: github.event_name == 'pull_request'
        env:
          COVERAGE_BASE_REF: origin/${{ github.base_ref }}
        run: npm run test:coverage:changed

      - name: Critical production interaction
        if: github.event_name == 'pull_request'
        env:
          PLAYWRIGHT_REPEAT_EACH: "3"
        run: npm run test:repeat:critical

  full-playwright:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Full Playwright shard
        run: npm run test:full:shard -- ${{ matrix.shard }}/4

  dependency-audit:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit production and development dependencies
        run: npm audit --audit-level=low

  accessibility:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build application
        run: npm run build
      - name: Rendered accessibility
        run: npm run test:accessibility

  visual-regression:
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Verify visual baselines
        run: npm run test:visual
